name: Build Skia
run-name: Build Skia
on:
  workflow_dispatch:
    inputs:
      skia_branch:
        description: 'Skia branch to build (e.g., chrome/m144)'
        required: false
        type: string
        default: 'chrome/m147'
      platforms:
        description: 'Platforms to build (comma-separated, or "all")'
        required: false
        type: string
        default: 'win,linux'
      test_mode:
        description: 'Run in test mode (skip Skia build)'
        required: false
        type: boolean
        default: false
      skip_release:
        description: 'Skip creating release (useful for testing single platforms)'
        required: false
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-skia:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            variant: gpu
            arch: x64
            config: Release
          - os: ubuntu-latest
            platform: linux
            variant: gpu
            arch: x64
    runs-on: ${{ matrix.os }}
    env:
      SKIA_BRANCH: ${{ inputs.skia_branch || 'chrome/m147' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev libgl1-mesa-dev libglu1-mesa-dev libx11-xcb-dev libxcb1-dev libxcb-xkb-dev libwayland-dev ninja-build

      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set Git default branch
        run: git config --global init.defaultBranch main

      - name: Install LLVM and Clang (Windows)
        if: runner.os == 'Windows'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "19.1.0"
          env: true

      - name: Cache depot_tools and Skia source
        uses: actions/cache@v4
        with:
          path: |
            build/tmp/depot_tools
            build/src/skia
          key: ${{ runner.os }}-${{ matrix.arch }}-depot_tools-skia-${{ env.SKIA_BRANCH }}-${{ hashFiles('build-skia.py') }}

      - name: Build Skia (Release)
        if: !inputs.test_mode
        shell: bash
        run: |
          ARCH_ARG=""
          if [ -n "${{ matrix.arch }}" ]; then
            ARCH_ARG="-archs ${{ matrix.arch }}"
          fi
          CONFIG="${{ matrix.config || 'Release' }}"
          python3 build-skia.py ${{ matrix.platform }} -variant ${{ matrix.variant }} -config $CONFIG --shallow -branch ${{ env.SKIA_BRANCH }} $ARCH_ARG

      - name: Set archive name
        id: archive
        shell: bash
        run: |
          CONFIG="${{ matrix.config || 'Release' }}"
          CONFIG_LOWER=$(echo "$CONFIG" | tr '[:upper:]' '[:lower:]')
          NAME="skia-build-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.variant }}-${CONFIG_LOWER}"
          echo "name=${NAME}" >> $GITHUB_OUTPUT

      - name: Create dummy files for test mode
        if: inputs.test_mode
        shell: bash
        run: |
          mkdir -p build/include
          mkdir -p build/${{ matrix.platform }}-${{ matrix.variant }}
          echo "Test file" > build/include/test.h
          echo "Test lib" > build/${{ matrix.platform }}-${{ matrix.variant }}/test.lib

      - name: Package binaries
        shell: bash
        run: |
          SHARE_DIR=""
          if [ -d "build/share" ]; then
            SHARE_DIR="build/share"
          fi
          if [ "${{ runner.os }}" == "Windows" ]; then
            7z a -tzip ${{ steps.archive.outputs.name }}.zip build/include $SHARE_DIR build/${{ matrix.platform }}-${{ matrix.variant }}
          else
            zip -r ${{ steps.archive.outputs.name }}.zip build/include $SHARE_DIR build/${{ matrix.platform }}-${{ matrix.variant }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.archive.outputs.name }}
          path: ${{ steps.archive.outputs.name }}.zip
